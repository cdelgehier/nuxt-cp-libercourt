version: 2
updates:
  - package-ecosystem: npm
    directory: /club-pongiste-libercourtois
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      nuxt-ecosystem:
        patterns:
          - nuxt
          - "@nuxt/*"
          - "@nuxtjs/*"
      drizzle:
        patterns:
          - drizzle-*
          - "@neondatabase/*"
      dev-tooling:
        patterns:
          - eslint*
          - prettier*
          - typescript*
          - vitest*
          - "@playwright/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
