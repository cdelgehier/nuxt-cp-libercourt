name: Tests

on:
  push:
    branches: [main, feat/**]
    paths:
      - "club-pongiste-libercourtois/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]
  workflow_call:

defaults:
  run:
    working-directory: club-pongiste-libercourtois

jobs:
  test:
    name: Typecheck, Lint & Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: club-pongiste-libercourtois/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint:check

      - name: Unit tests
        run: pnpm test:unit

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: club-pongiste-libercourtois/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NITRO_PRESET: node-server

      - name: Start server
        run: node .output/server/index.mjs &
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_BASIC_AUTH_USER: ${{ secrets.ADMIN_BASIC_AUTH_USER }}
          ADMIN_BASIC_AUTH_HASH: ${{ secrets.ADMIN_BASIC_AUTH_HASH }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
